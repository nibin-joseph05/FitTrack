name: fit_track
description: "A new Flutter project."
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/logo.png


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo/logo.png"
  min_sdk_android: 21