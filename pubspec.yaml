name: fit_track
description: FitTrack - Gym Workout Progress Tracking App
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.70.2
  intl: ^0.19.0
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  flutter_launcher_icons: ^0.14.4
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo/logo.png


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo/logo.png"
  min_sdk_android: 21